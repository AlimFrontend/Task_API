services:
  - type: web
    name: nestjs-task-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /tasks?page=1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /tmp/tasks.sqlite
